<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./main/src/DP.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./main/css/main.css">
    <title>Calculator</title>
</head>

<body style="width: 100vw;height: 100vh;">

    <main class="w-100 h-100 my-bg-color d-flex justify-content-center align-items-center">
        <div id="calculator" class="d-flex flex-column border w-25">
            <input type="text" name="display" id="display" readonly class="fs-3">
            <div id="buttons" class="border">
                <button class="btn btn-danger px-5" onclick="clearInput()">C</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('1')">1</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('2')">2</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('/')">/</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('3')">3</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('4')">4</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('*')">*</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('5')">5</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('6')">6</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('+')">+</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('7')">7</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('8')">8</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('-')">-</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('9')">9</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('00')">00</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('.')">.</button>
                <button class="btn my-btn-color px-4" onclick="addToInput('0')">0</button>
                <button class="btn my-btn-color px-4" onclick="ShowResult()">=</button>
            </div>
        </div>
    </main>

    <script src="./main/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
