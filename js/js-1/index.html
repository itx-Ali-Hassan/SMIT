<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./main/css/main.css">
    <link rel="shortcut icon" href="./main/src/DP.png" type="image/x-icon">
    <title>Assignments Ch 1 - 7</title>
</head>

<body class="">

    <header class="d-flex py-2 justify-content-around width-100 my-bg-color">
        <div class="d-flex p-0 m-0 justify-content-around width-15">
            <span class="fw-bold">Assignments</span>
            <p>Chapter 1 - 7</p>
        </div>
        <div>
            <search class="d-md-flex gap-3 d-none">
                <input class="rounded p-2" type="text" placeholder="Search">
                <button type="button" class="btn btn-outline-success">Success</button>
            </search>
        </div>
    </header>

    <main class="text-capitalize container text-center mt-5">
        <h3>Chapter # 1 - 7 | introduction to javaScript | data type | alert | arithmetic operation</h3>
        <hr>
        <div class="border rounded border-dark-subtle container mt-5 py-4 px-5">
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="alertName()">alert name</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="alertNumber()">alert number</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="showVariableName()">show variable name</button>
            <button type="button" class="btn btn-danger mt-2" onclick="camelCaseExample()">show camelCase example</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="sum2Number()">sum 2 number</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="sub2Number()">subtract 2 number</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="mul2Number()">multiply 2 number</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="divide2Number()">divide 2 number</button>
            <button type="button" class="btn btn-danger mt-2 text-capitalize" onclick="calculateNumber()">calculate some number</button>
        </div>
        <div class="mt-5 text-capitalize">
            <h2>original statement</h2>
            <div class="border rounded border-dark-subtle p-3 statement"></div>
            <button type="button" class="btn btn-outline-secondary text-capitalize mt-3" onclick="clearOutput()">clear statement</button>
        </div>
        <div class="mt-5 text-capitalize">
            <h2>output / result</h2>
            <div class="output border rounded border-dark-subtle p-3"></div>
            <button type="button" class="btn btn-outline-secondary text-capitalize mt-3" onclick="clearOutput()">clear output</button>
        </div>
    </main>

    <footer class="mt-5">
        <div class="container-fluid p-2 my-bg-color text-center d-md-flex flex-row align-items-center gap-3 justify-content-center">
            <div>&COPY; 2026 Assignments By <span class="fw-bold">Ali Hassan</span></div>
            <div class="d-flex justify-content-center align-items-center gap-2">
                <a href="https://github.com/itx-ali-hassan" target="_blank"><img src="./main/src/github.png" alt="github" height="40"></a>
                <a href="https://www.instagram.com/itx.ali.hassanch/" target="_blank"><img src="./main/src/instagram.png" alt="instagram" height="40"></a>
                <a href="https://linkedin.com/in/itx-ali-hassan" target="_blank"><img src="./main/src/linkedin.png" alt="linkedin" height="40"></a>
            </div>
        </div>        
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./main/js/main.js"></script>
</body>

</html>
